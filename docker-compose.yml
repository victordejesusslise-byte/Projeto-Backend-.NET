services:
  # O SQL Server não roda neste Compose. A API conecta ao
  # SQLEXPRESS03 instalado no host por host.docker.internal.
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: usuarios_api
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      AllowedHosts: ${ALLOWED_HOSTS:-localhost;127.0.0.1}
      ConnectionStrings__DefaultConnection: ${SQLSERVER_DOCKER_CONNECTION:?Defina SQLSERVER_DOCKER_CONNECTION no arquivo .env}
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
